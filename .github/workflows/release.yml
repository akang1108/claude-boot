name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d v)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Build artifacts
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64 go build -o dist/claude-boot-darwin-arm64 .
          GOOS=linux   GOARCH=amd64 go build -o dist/claude-boot-linux-amd64 .
          GOOS=windows GOARCH=amd64 go build -o dist/claude-boot-windows-amd64.exe .

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*
            dist/checksums.txt
